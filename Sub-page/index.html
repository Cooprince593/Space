<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Carta de Presentación</title>
  
  <link rel="icon" type="image/png" href="white-flower.png?v=2" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    /* ── Reset básico ── */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── PANTALLA DE BIENVENIDA (Bypass de Autoplay) ── */
    #welcome-overlay {
      position: fixed;
      inset: 0;
      background: #050505;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
      cursor: pointer;
    }
    
    #welcome-overlay.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #welcome-rose {
      width: 90px;
      opacity: 0.5;
      margin-bottom: 30px;
      animation: pulseRose 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
    }

    #welcome-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 16px 44px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }

    #welcome-overlay:hover #welcome-btn {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    }

    #welcome-caption {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      margin-top: 16px;
      letter-spacing: 0.05em;
    }

    /* ── Canvas Espacial ── */
    #space-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Estrellas Fugaces ── */
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }
    .shooting-star:nth-child(1) { top: 12%; left: 8%; animation: shoot 6s linear 0s infinite; }
    .shooting-star:nth-child(2) { top: 38%; left: 4%; animation: shoot 8s linear 2.5s infinite; }
    .shooting-star:nth-child(3) { top: 62%; left: 18%; animation: shoot 5s linear 4s infinite; }
    .shooting-star:nth-child(4) { top: 7%; left: 52%; animation: shoot 7s linear 1s infinite; }
    .shooting-star:nth-child(5) { top: 48%; left: 72%; animation: shoot 9s linear 3.5s infinite; }

    /* ── Decoraciones (Rosas de fondo) ── */
    .rose-corner {
      position: fixed;
      width: 220px;
      opacity: 0.07;
      pointer-events: none;
      z-index: 2;
    }
    .rose-tl { top: -40px; right: -40px; transform: rotate(15deg); }
    .rose-br { bottom: -40px; left: -40px; transform: rotate(200deg); }

    /* ── Contenedor Central ── */
    #center {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #card-wrap {
      animation: float 7s ease-in-out infinite, fadeInUp 0.85s cubic-bezier(.16,1,.3,1) both;
      perspective: 1200px;
      /* Ajustamos el ancho para que la tarjeta sea horizontal */
      width: min(92vw, 650px);
      position: relative;
    }

    /* ── Tarjeta Estilo Aero Glass (Horizontal) ── */
    #card {
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255, 255, 255, 0.15);
      padding: 44px 40px;
      
      /* Layout Horizontal */
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 40px;
      
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.4s cubic-bezier(.03,.98,.52,.99), box-shadow 0.4s ease;
    }

    /* Media query para móviles: se vuelve vertical si no hay espacio */
    @media (max-width: 600px) {
      #card {
        flex-direction: column;
        padding: 34px 24px;
        gap: 24px;
      }
      .card-left {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      #profile-info {
        align-items: center;
      }
      .card-right {
        border-left: none !important;
        padding-left: 0 !important;
        width: 100%;
      }
    }

    #card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      border-radius: 999px;
      pointer-events: none;
    }

    .card-rose {
      position: absolute;
      width: 120px;
      opacity: 0.15;
      pointer-events: none;
    }
    .card-rose-tl { top: -18px; left: -22px; transform: rotate(-20deg); }
    .card-rose-br { bottom: -18px; right: -22px; transform: rotate(160deg); }

    /* ── Columnas de la Tarjeta ── */
    .card-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      text-align: left;
      gap: 18px;
      position: relative;
      z-index: 1;
      min-width: 260px;
    }

    #avatar-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    #profile-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }

    #profile-name {
      margin: 0;
      color: rgba(255,255,255,0.95);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .profile-role {
      margin: 0;
      color: rgba(209,213,219,0.78);
      font-size: 13px;
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
      padding-left: 24px;
      padding-right: 8px;
      padding-top: 16px;
    }

    .card-right::before {
      content: '';
      position: absolute;
      top: 12%;
      bottom: 12%;
      left: 6px;
      width: 1px;
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.25), transparent);
    }

    #discord-activity {
      margin-top: 16px;
      text-align: center;
      color: rgba(209,213,219,0.8);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: 0.01em;
    }

    #discord-activity .status-title {
      margin-bottom: 6px;
      color: rgba(255,255,255,0.9);
      font-weight: 700;
      font-size: 14px;
    }

    #discord-activity .status-user,
    #discord-activity .status-id {
      margin: 0;
    }

    #discord-connect {
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
    }

    #discord-connect:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    #discord-connect:active {
      transform: translateY(0);
    }

    .status-note {
      margin: 10px 0 0;
      color: rgba(209,213,219,0.72);
      font-size: 12px;
      text-align: center;
    }

    #connections-row {
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 18px;
      width: 100%;
      max-width: 320px;
      margin-top: auto; /* empuja los botones hacia abajo */
      margin-bottom: 18px;
    }

    /* Botones de conexión: cuadrados con esquinas redondeadas */
    .connection-box {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.92);
      transition: all 0.28s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-decoration: none;
      position: relative;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }

    /* Tira informativa compacta similar a la ordenación solicitada */
    .info-strip {
      width: 100%;
      display: none; /* oculto por defecto; se mostrará al conectar Discord */
      gap: 14px;
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 6px;
      backdrop-filter: blur(6px);
    }
    .info-strip.visible { display: flex }

    .mini-card {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .mini-card .mini-avatar {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }

    .mini-card .mini-avatar img { width: 100%; height: 100%; object-fit: cover; display:block }

    .mini-card .mini-info {
      display:flex;flex-direction:column;gap:4px;min-width:0;
    }

    .mini-title { color: rgba(255,255,255,0.92); font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
    .mini-sub { color: rgba(209,213,219,0.72); font-size:12px }

    .connection-box::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .connection-box:hover::after {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .connection-box:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .connection-box svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ── Anillo del Avatar ── */
    #avatar-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    #avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(255,255,255,0.1), rgba(255,255,255,0.8), rgba(255,255,255,0.1));
      animation: spin 4s linear infinite;
      filter: blur(1px);
    }
    #avatar-bg {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: #080808;
    }
    #avatar-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      object-fit: cover;
      display: block;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    
    #online-dot {
      position: absolute;
      bottom: 6px; right: 6px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #23a559;
      border: 3px solid #080808;
      z-index: 2;
    }

    /* ── Divisor ── */
    #divider {
      width: 80%;
      max-width: 300px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin: 0 auto 24px;
    }

    .section-title {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      margin-bottom: 14px;
      opacity: 0.9;
    }

    /* ── Botón Portafolio ── */
    #go-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 14px 22px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      letter-spacing: 0.02em;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    #go-btn:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* ── Interfaz del Control de Música ── */
    #music-container {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 6px;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    #music-container:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
    }

    #music-toggle {
      background: transparent;
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    #music-toggle:hover {
      transform: scale(1.08);
    }

    #volume-slider {
      width: 0;
      opacity: 0;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      margin: 0;
    }

    #music-container:hover #volume-slider {
      width: 85px;
      opacity: 1;
      pointer-events: auto;
      margin-left: 10px;
      margin-right: 6px;
    }

    #volume-slider::-webkit-slider-thumb,
    #volume-slider::-moz-range-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      transition: transform 0.1s ease;
      border: none;
    }

    /* ── Animaciones ── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes shoot {
      0%   { transform: translateX(0) translateY(0) scale(1); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 0.8; }
      100% { transform: translateX(700px) translateY(300px) scale(0.5); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulseRose {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.06); opacity: 0.65; }
    }
  </style>
</head>
<body>

  <div id="welcome-overlay">
    <img id="welcome-rose" src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png" alt="Rosa de Bienvenida" />
    <button id="welcome-btn">Descubrir</button>
    <p id="welcome-caption">Haz clic para entrar y reproducir música</p>
  </div>

  <audio id="bg-music" loop>
    <source src="WUF.mp3" type="audio/mpeg">
  </audio>

  <div id="music-container">
    <button id="music-toggle" aria-label="Reproducir música">
      <svg id="icon-muted" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </svg>
      <svg id="icon-playing" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
    </button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" aria-label="Control de volumen">
  </div>

  <canvas id="space-canvas"></canvas>

  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <img class="rose-corner rose-tl" src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png" alt="" />
  <img class="rose-corner rose-br" src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png" alt="" />

  <div id="center">
    <div id="card-wrap">
      <div id="card">
        
        <img class="card-rose card-rose-tl" src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png" alt="" />
        <img class="card-rose card-rose-br" src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png" alt="" />

        <div class="card-left">
          <div id="avatar-column">
            <div id="avatar-wrap">
              <div id="avatar-ring"></div>
              <div id="avatar-bg"></div>
              
              <img id="avatar-img" src="https://cdn.discordapp.com/embed/avatars/1.png" alt="Mi foto de perfil" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" />
              <div id="online-dot"></div>
            </div>
            <div id="profile-info">
              <p id="profile-name">Prince</p>
              <p class="profile-role">Jugador · Creador · Perfil activo</p>
            </div>
            <div id="discord-activity">
              <p class="status-title">Discord</p>
              <button id="discord-connect">Conectar con Discord</button>
              <p class="status-note">Presiona para sincronizar tu perfil y actividad desde Discord.</p>
            </div>
          </div>
        </div>

        <div class="card-right">
          <p class="section-title">Conexiones</p>
          <div id="divider"></div>

          <div class="info-strip" id="discord-strip" aria-hidden="true"><!-- visible only after Discord connect --></div>

          <div id="connections-row">
            <a class="connection-box" href="#" target="_blank" title="Discord" data-tooltip="Discord">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"></svg>
            </a>
            <a class="connection-box" href="#" target="_blank" title="Roblox" data-tooltip="Roblox">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M5 3h14l-3.5 16H8.5L5 3zm5 5.2l-1 5.2h3.9l1-5.2H10z"/>
              </svg>
            </a>
            <a class="connection-box" href="#" target="_blank" title="Steam" data-tooltip="Steam">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <circle cx="15.5" cy="8.5" r="2.5"/>
                <circle cx="7.5" cy="16.5" r="1.8"/>
                <path d="M6.4 16.8l4.2-1.7c.6.7 1.5 1.1 2.5 1.1 1.9 0 3.5-1.6 3.5-3.5S15 9.2 13.1 9.2c-.7 0-1.4.3-1.9.8L6.4 8.8"/>
                <path d="M6.4 16.8l3.7 3c1.2.9 3 .7 4.1-.5 1.1-1.2 1.1-3 .1-4.2L9.3 12.8"/>
              </svg>
            </a>
            <a class="connection-box" href="#" target="_blank" title="GitHub" data-tooltip="GitHub">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

    </div>
  </div>

  <script>
    // ─── Control de Audio Inteligente con Pantalla de Entrada ───
    (function () {
      const bgMusic = document.getElementById('bg-music');
      const musicBtn = document.getElementById('music-toggle');
      const volumeSlider = document.getElementById('volume-slider');
      const iconMuted = document.getElementById('icon-muted');
      const iconPlaying = document.getElementById('icon-playing');
      const welcomeOverlay = document.getElementById('welcome-overlay');

      bgMusic.volume = volumeSlider.value;

      function updateIcons() {
        if (!bgMusic.paused && bgMusic.volume > 0) {
          iconMuted.style.display = 'none';
          iconPlaying.style.display = 'block';
        } else {
          iconMuted.style.display = 'block';
          iconPlaying.style.display = 'none';
        }
      }

      bgMusic.addEventListener('play', updateIcons);
      bgMusic.addEventListener('pause', updateIcons);
      bgMusic.addEventListener('volumechange', updateIcons);

      welcomeOverlay.addEventListener('click', () => {
        bgMusic.play().catch(err => console.log("Error al reproducir:", err));
        welcomeOverlay.classList.add('fade-out');
        updateIcons();
      });

      musicBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!bgMusic.paused) {
          bgMusic.pause();
        } else {
          bgMusic.play().catch(err => console.log(err));
        }
      });

      volumeSlider.addEventListener('input', (e) => {
        bgMusic.volume = parseFloat(e.target.value);
      });

      updateIcons();
    })();

    // ─── Botón de conexión a Discord ───
    (function () {
      const discordConnect = document.getElementById('discord-connect');
      if (!discordConnect) return;

      discordConnect.addEventListener('click', () => {
        // Placeholder flow: show info-strip when user confirms connection
        const confirmConnect = confirm('Simular conexión a Discord en esta página de demostración?');
        if (!confirmConnect) {
          alert('Para conectar Discord correctamente se necesita una integración con OAuth o backend.');
          return;
        }
        const strip = document.getElementById('discord-strip');
        if (strip) {
          strip.classList.add('visible');
          strip.setAttribute('aria-hidden', 'false');
        }
        discordConnect.textContent = 'Conectado';
        discordConnect.disabled = true;
      });
    })();

    // ─── Fondo espacial animado (Canvas) ───
    (function () {
      const canvas = document.getElementById('space-canvas');
      const ctx    = canvas.getContext('2d');
      const COLORS = ['#ffffff','#d1d5db','#9ca3af','#6b7280','#4b5563','#e5e7eb'];
      const particles = [];
      
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      for (let i = 0; i < 200; i++) {
        particles.push({
          x:     Math.random() * canvas.width,
          y:     Math.random() * canvas.height,
          r:     Math.random() * 1.6 + 0.2,
          dx:    (Math.random() - 0.5) * 0.12,
          dy:    (Math.random() - 0.5) * 0.12,
          alpha: Math.random() * 0.6 + 0.2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const bg = ctx.createLinearGradient(0, 0, canvas.width * 0.6, canvas.height);
        bg.addColorStop(0,   '#000000');
        bg.addColorStop(0.5, '#0a0a0a');
        bg.addColorStop(1,   '#111111');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        [
          { x: canvas.width*0.15, y: canvas.height*0.2,  r: 280, c: 'rgba(100,100,110,0.05)' },
          { x: canvas.width*0.82, y: canvas.height*0.6,  r: 220, c: 'rgba(80,80,90,0.04)'    },
          { x: canvas.width*0.5,  y: canvas.height*0.85, r: 190, c: 'rgba(60,60,70,0.035)'   },
        ].forEach(b => {
          const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
          g.addColorStop(0, b.c);
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
        });

        particles.forEach(p => {
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle   = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0) p.x = canvas.width;
          if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height;
          if (p.y > canvas.height) p.y = 0;
        });

        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ─── Efecto 3D (Tilt) en la Tarjeta ───
    (function () {
      const wrap = document.getElementById('card-wrap');
      const card = document.getElementById('card');
      const MAX  = 12;
      let raf;

      wrap.addEventListener('mousemove', e => {
        const rect = wrap.getBoundingClientRect();
        const cx   = rect.left + rect.width  / 2;
        const cy   = rect.top  + rect.height / 2;
        const rx   = (-(e.clientY - cy) / (rect.height / 2)) * MAX;
        const ry   = ( (e.clientX - cx) / (rect.width  / 2)) * MAX;
        
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          card.style.transform  = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
          card.style.transition = 'transform 0.1s ease-out, box-shadow 0.2s ease';
          card.style.boxShadow  = '0 32px 80px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.2)';
        });
      });

      wrap.addEventListener('mouseleave', () => {
        cancelAnimationFrame(raf);
        card.style.transform  = 'rotateX(0deg) rotateY(0deg) scale(1)';
        card.style.transition = 'transform 0.5s cubic-bezier(.03,.98,.52,.99), box-shadow 0.5s ease';
        card.style.boxShadow  = '0 24px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.15)';
      });
    })();
  </script>
