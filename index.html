<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord — Autorización Completada</title>
  
  <link rel="icon" type="image/png" href="white-flower.png?v=2" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    /* ── Reset básico ── */
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Canvas Espacial ── */
    #space-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Estrellas Fugaces ── */
    .shooting-star {
      position: fixed;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }
    .shooting-star:nth-child(1) { top: 12%; left: 8%; animation: shoot 6s linear 0s infinite; }
    .shooting-star:nth-child(2) { top: 38%; left: 4%; animation: shoot 8s linear 2.5s infinite; }
    .shooting-star:nth-child(3) { top: 62%; left: 18%; animation: shoot 5s linear 4s infinite; }
    .shooting-star:nth-child(4) { top: 7%; left: 52%; animation: shoot 7s linear 1s infinite; }
    .shooting-star:nth-child(5) { top: 48%; left: 72%; animation: shoot 9s linear 3.5s infinite; }

    /* ── Decoraciones (Rosas de fondo) ── */
    .rose-corner {
      position: fixed;
      width: 220px;
      opacity: 0.07;
      pointer-events: none;
      z-index: 2;
    }
    .rose-tl { top: -40px; right: -40px; transform: rotate(15deg); }
    .rose-br { bottom: -40px; left: -40px; transform: rotate(200deg); }

    /* ── Contenedor Central ── */
    #center {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #card-wrap {
      animation: float 7s ease-in-out infinite, fadeInUp 0.85s cubic-bezier(.16,1,.3,1) both;
      perspective: 1200px;
      width: min(92vw, 400px);
      position: relative;
    }

    /* ── Tarjeta Estilo Aero Glass ── */
    #card {
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255, 255, 255, 0.15);
      padding: 44px 38px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.4s cubic-bezier(.03,.98,.52,.99), box-shadow 0.4s ease;
    }

    /* Brillo superior de la tarjeta */
    #card::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      border-radius: 999px;
      pointer-events: none;
    }

    /* ── Rosas dentro de la tarjeta ── */
    .card-rose {
      position: absolute;
      width: 120px;
      opacity: 0.15;
      pointer-events: none;
    }
    .card-rose-tl { top: -18px; left: -22px; transform: rotate(-20deg); }
    .card-rose-br { bottom: -18px; right: -22px; transform: rotate(160deg); }

    /* ── Insignia (Badge) ── */
    #badge {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 26px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 99px;
      padding: 6px 16px 6px 11px;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
    }
    #badge span {
      color: #e5e7eb;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Anillo del Avatar ── */
    #avatar-wrap {
      position: relative;
      margin-bottom: 20px;
      z-index: 1;
    }
    #avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(255,255,255,0.1), rgba(255,255,255,0.8), rgba(255,255,255,0.1));
      animation: spin 4s linear infinite;
      filter: blur(1px);
    }
    #avatar-bg {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: #080808;
    }
    #avatar-img, #avatar-default {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      position: relative;
      z-index: 1;
    }
    #avatar-img {
      object-fit: cover;
      display: block;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #avatar-default {
      background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #online-dot {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #23a559;
      border: 3px solid #080808;
      z-index: 2;
    }

    /* ── Textos ── */
    #username-text {
      color: rgba(209,213,219,0.8);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      position: relative;
      z-index: 1;
      display: none;
    }
    #title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }
    #title-row h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    #subtitle {
      color: rgba(156,163,175,0.85);
      font-size: 13px;
      text-align: center;
      margin-bottom: 30px;
      line-height: 1.6;
      max-width: 270px;
      position: relative;
      z-index: 1;
    }

    /* ── Rosa central ── */
    #center-rose {
      width: 64px;
      opacity: 0.4;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 12px rgba(255,255,255,0.15));
      position: relative;
      z-index: 1;
    }

    /* ── Divisor ── */
    #divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin-bottom: 26px;
      position: relative;
      z-index: 1;
    }

    /* ── Botón ── */
    #go-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 14px 22px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      letter-spacing: 0.02em;
      cursor: pointer;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
    }
    #go-btn:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* ── Detalles del pie de tarjeta ── */
    #sparkle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      opacity: 0.5;
      position: relative;
      z-index: 1;
    }
    #sparkle-row span {
      color: #d1d5db;
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    /* ── Botón de Música ── */
    #music-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    #music-toggle:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* ── Footer de la página ── */
    #footer {
      position: fixed;
      bottom: 16px;
      color: rgba(107,114,128,0.5);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-align: center;
      z-index: 10;
    }

    /* ── Animaciones (Keyframes) ── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes shoot {
      0%   { transform: translateX(0) translateY(0) scale(1); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 0.8; }
      100% { transform: translateX(700px) translateY(300px) scale(0.5); opacity: 0; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

    <div id="card-wrap">
      
      <div id="card">

        <img class="card-rose card-rose-br" src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png?ex=6a178bcf&is=6a163a4f&hm=d257c10940845ca80f4ecdd1d09336db3a34440bbd5b96c196433aa62ac88b31&=&format=webp&quality=lossless&width=341&height=300" alt="" />

  <script>
    // ─── Lógica para la Música de Fondo ───
    (function () {
      const bgMusic = document.getElementById('bg-music');
      const musicBtn = document.getElementById('music-toggle');
      const iconMuted = document.getElementById('icon-muted');
      const iconPlaying = document.getElementById('icon-playing');
      let isPlaying = false;

      // Ajusta el volumen si WUF.mp3 suena muy fuerte (0.0 a 1.0)
      bgMusic.volume = 0.5;

      musicBtn.addEventListener('click', () => {
        if (isPlaying) {
          bgMusic.pause();
          iconMuted.style.display = 'block';
          iconPlaying.style.display = 'none';
        } else {
          bgMusic.play();
          iconMuted.style.display = 'none';
          iconPlaying.style.display = 'block';
        }
        isPlaying = !isPlaying;
      });
    })();

    // ─── Lógica para leer parámetros de URL ───
    (function () {
      const p = new URLSearchParams(window.location.search);
      const avatarParam   = p.get('avatar');
      const usernameParam = p.get('username');
      const userIdParam   = p.get('user_id') || p.get('id');
      const avatarHash    = p.get('avatar_hash');

      let avatarUrl = null;
      if (avatarParam) {
        avatarUrl = decodeURIComponent(avatarParam);
      } else if (userIdParam && avatarHash) {
        const ext = avatarHash.startsWith('a_') ? 'gif' : 'png';
        avatarUrl = `https://cdn.discordapp.com/avatars/${userIdParam}/${avatarHash}.${ext}?size=256`;
      }

      if (avatarUrl) {
        const img = document.getElementById('avatar-img');
        const def = document.getElementById('avatar-default');
        img.src = avatarUrl;
        img.style.display = 'block';
        def.style.display = 'none';
      }

      if (usernameParam) {
        const el = document.getElementById('username-text');
        el.textContent = '@' + decodeURIComponent(usernameParam);
        el.style.display = 'block';
      }
    })();

    // ─── Animación del fondo espacial (Canvas) ───
    (function () {
      const canvas = document.getElementById('space-canvas');
      const ctx    = canvas.getContext('2d');
      const COLORS = ['#ffffff','#d1d5db','#9ca3af','#6b7280','#4b5563','#e5e7eb'];
      const particles = [];
      
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      for (let i = 0; i < 200; i++) {
        particles.push({
          x:     Math.random() * canvas.width,
          y:     Math.random() * canvas.height,
          r:     Math.random() * 1.6 + 0.2,
          dx:    (Math.random() - 0.5) * 0.12,
          dy:    (Math.random() - 0.5) * 0.12,
          alpha: Math.random() * 0.6 + 0.2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const bg = ctx.createLinearGradient(0, 0, canvas.width * 0.6, canvas.height);
        bg.addColorStop(0,   '#000000');
        bg.addColorStop(0.5, '#0a0a0a');
        bg.addColorStop(1,   '#111111');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        [
          { x: canvas.width*0.15, y: canvas.height*0.2,  r: 280, c: 'rgba(100,100,110,0.05)' },
          { x: canvas.width*0.82, y: canvas.height*0.6,  r: 220, c: 'rgba(80,80,90,0.04)'    },
          { x: canvas.width*0.5,  y: canvas.height*0.85, r: 190, c: 'rgba(60,60,70,0.035)'   },
        ].forEach(b => {
          const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
          g.addColorStop(0, b.c);
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();
        });

        particles.forEach(p => {
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle   = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0) p.x = canvas.width;
          if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height;
          if (p.y > canvas.height) p.y = 0;
        });

        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // ─── Efecto 3D (Tilt) mejorado para la tarjeta ───
    (function () {
      const wrap = document.getElementById('card-wrap');
      const card = document.getElementById('card');
      const MAX  = 12;
      let raf;

      wrap.addEventListener('mousemove', e => {
        const rect = wrap.getBoundingClientRect();
        const cx   = rect.left + rect.width  / 2;
        const cy   = rect.top  + rect.height / 2;
        const rx   = (-(e.clientY - cy) / (rect.height / 2)) * MAX;
        const ry   = ( (e.clientX - cx) / (rect.width  / 2)) * MAX;
        
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          card.style.transform  = `rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
          card.style.transition = 'transform 0.1s ease-out, box-shadow 0.2s ease';
          card.style.boxShadow  = '0 32px 80px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.2)';
        });
      });

      wrap.addEventListener('mouseleave', () => {
        cancelAnimationFrame(raf);
        card.style.transform  = 'rotateX(0deg) rotateY(0deg) scale(1)';
        card.style.transition = 'transform 0.5s cubic-bezier(.03,.98,.52,.99), box-shadow 0.5s ease';
        card.style.boxShadow  = '0 24px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.15)';
      });
    })();
  </script>
</body>
</html>
