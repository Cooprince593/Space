<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorización Completada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: #09090b;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 4px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; overflow: hidden; position: relative;
        }

        /* MAGIA PARA LAS ROSAS (Borra el fondo negro) */
        .rose {
            position: absolute;
            mix-blend-mode: screen; /* Esto quita el color negro de la imagen */
            pointer-events: none; /* Para que no molesten al hacer clic */
            user-select: none;
            opacity: 0.15; /* Transparencia */
            z-index: 1;
            filter: grayscale(100%);
        }

        /* Posiciones de las rosas de fondo */
        .rose-bg-1 { bottom: -10%; left: -5%; width: 400px; transform: rotate(-20deg); opacity: 0.08; }
        .rose-bg-2 { top: -10%; right: -5%; width: 350px; transform: rotate(110deg); opacity: 0.08; }

        /* TARJETA */
        .card {
            background: rgba(18, 18, 20, 0.7);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px; padding: 40px 30px;
            width: 100%; max-width: 420px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 10; overflow: hidden;
        }

        /* Rosas DENTRO de la tarjeta */
        .rose-card-1 { top: -30px; left: -30px; width: 120px; opacity: 0.2; }
        .rose-card-2 { bottom: 90px; left: 50%; transform: translateX(-50%); width: 60px; opacity: 0.3; }

        .badge { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 6px 16px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 1px; color: #a1a1aa; display: flex; align-items: center; gap: 6px; margin-bottom: 30px; z-index: 2;}
        .profile-ring { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; margin-bottom: 25px; position: relative; z-index: 2;}
        .profile-ring svg { width: 40px; height: 40px; color: #d4d4d8; }
        .status-dot { position: absolute; bottom: 5px; right: 5px; width: 16px; height: 16px; background-color: #22c55e; border-radius: 50%; border: 3px solid #121214; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; z-index: 2;}
        h1 svg { width: 24px; height: 24px; }
        p { color: #a1a1aa; text-align: center; font-size: 14px; line-height: 1.5; margin-bottom: 55px; padding: 0 10px; z-index: 2;}
        
        .btn { background-color: #27272a; color: white; border: 1px solid rgba(255,255,255,0.05); width: 100%; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s ease; text-decoration: none; z-index: 2;}
        .btn:hover { background-color: #3f3f46; transform: translateY(-2px); }
        .card-footer { margin-top: 20px; font-size: 10px; color: #52525b; letter-spacing: 1px; z-index: 2;}
        .page-footer { position: absolute; bottom: 20px; font-size: 11px; color: #3f3f46; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- Rosas de Fondo de la página -->
    <img src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png?ex=6a178bcf&is=6a163a4f&hm=d257c10940845ca80f4ecdd1d09336db3a34440bbd5b96c196433aa62ac88b31&=&format=webp&quality=lossless&width=341&height=300" class="rose rose-bg-1" alt="">
    <img src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png?ex=6a178bcf&is=6a163a4f&hm=d257c10940845ca80f4ecdd1d09336db3a34440bbd5b96c196433aa62ac88b31&=&format=webp&quality=lossless&width=341&height=300" class="rose rose-bg-2" alt="">

    <div class="card" data-tilt data-tilt-max="8" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.15">
        
        <!-- Rosas DENTRO de la tarjeta -->
        <img src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png?ex=6a178bcf&is=6a163a4f&hm=d257c10940845ca80f4ecdd1d09336db3a34440bbd5b96c196433aa62ac88b31&=&format=webp&quality=lossless&width=341&height=300" class="rose rose-card-1" alt="">
        <img src="https://media.discordapp.net/attachments/1502878615841406986/1508989850232160357/rose.png?ex=6a178bcf&is=6a163a4f&hm=d257c10940845ca80f4ecdd1d09336db3a34440bbd5b96c196433aa62ac88b31&=&format=webp&quality=lossless&width=341&height=300" class="rose rose-card-2" alt="">

        <div class="badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            DISCORD OAUTH2
        </div>

        <div class="profile-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <div class="status-dot"></div>
        </div>

        <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>
            Autorización Completada
        </h1>
        <p>Tu cuenta de Discord ha sido verificada exitosamente. Ya puedes acceder al servidor.</p>

        <a href="#" class="btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            Ir al Servidor de Discord
        </a>

        <div class="card-footer">✧ SECURE · VERIFIED · OAUTH2 ✧</div>
    </div>

    <div class="page-footer">DISCORD AUTHORIZATION · SECURE OAUTH2</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
</body>
</html>
